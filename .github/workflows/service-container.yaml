name: "Service container"

on:
  push:

env:
  PORT: 8080
  NAME: "irs"
  ECS_TASK_FAMILY: "irs-service-task"

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      # Build and test the dotnet project
      - name: Setup dotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build
      - name: Test with the dotnet CLI
        run: dotnet test

  build-container:
    name: Build container
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      digist: ${{ steps.build-push-action.outputs.digest }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ vars.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY }}/${{ github.repository }}

      - name: Get Git hash
        id: git_hash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        id: build-push-action
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' && github.event_name != 'schedule' }}
          tags: ${{ vars.REGISTRY }}/${{ github.repository }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_HASH=${{ steps.git_hash.outputs.sha_short}}
            GIT_HASH_LONG=${{ github.sha }}

  deploy-container:
    name: Deploy container
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      id-token: write  # Needed to use OIDC authentication
      contents: read   # Allows reading repository contents

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # Configure AWS credentials using OIDC
      - name: Configure AWS credentials with OIDC
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_TOFU }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: terraform output
        id: terraform-output
        uses: dflook/tofu-output@v1.44.0
        with:
          path: tofu
          backend_config: |
            bucket=state-bucket-${{ vars.AWS_ACCOUNT_ID }}
            region=${{ vars.AWS_DEFAULT_REGION }}
            key=${{ github.repository }}-tfstate

      - name: Register new Task definition
        run: |
          FILE="./tofu/templates/irs-task-definition.json"
          cat <<< $(jq '.containerDefinitions[0].name = "${{ env.NAME }}"' $FILE ) > $FILE
          cat <<< $(jq '.containerDefinitions[0].image = "${{ vars.REGISTRY }}/${{ github.repository }}:${{ needs.build-container.outputs.digest }}"' $FILE ) > $FILE
          cat <<< $(jq '.containerDefinitions[0].repositoryCredentials.credentialsParameter = "${{ steps.terraform-output.outputs.github_pat_secret_arn }}"' $FILE ) > $FILE
          cat <<< $(jq '.containerDefinitions[0].logConfiguration.options."awslogs-group" = "${{ steps.terraform-output.outputs.irs_log_group_name }}"' $FILE ) > $FILE
          cat <<< $(jq '.containerDefinitions[0].logConfiguration.options."awslogs-region" = "${{ vars.AWS_DEFAULT_REGION }}"' $FILE ) > $FILE
          cat <<< $(jq '.containerDefinitions[0].portMappings[0].containerPort = ${{ env.PORT }}' $FILE ) > $FILE
          cat <<< $(jq '.containerDefinitions[0].healthCheck.command[1] = "curl -f http://localhost:${{ env.PORT }}/swagger/index.html || exit 1"' $FILE ) > $FILE

          export TASK_REVISION=$(aws ecs register-task-definition \
            --family "${{ env.ECS_TASK_FAMILY }}" \
            --cli-input-json file://$FILE \
            --region ${{ vars.AWS_DEFAULT_REGION }} | jq --raw-output '.taskDefinition.revision')
          
          echo "Registered ECS Task Definition = "$TASK_REVISION
          echo "Updated Task Definition = ${{ env.ECS_TASK_FAMILY }}:"$TASK_REVISION

          UPDATE_ECS_SERVICE=$(aws ecs update-service \
            --cluster ${{ steps.terraform-output.outputs.aws_ecs_cluster_name }} \
            --service ${{ steps.terraform-output.outputs.aws_ecs_service_name }} \
            --task-definition ${{ env.ECS_TASK_FAMILY }}:$TASK_REVISION \
            --desired-count 1 \
            --region ${{ vars.AWS_DEFAULT_REGION }} \
            --force-new-deployment | jq --raw-output '.service.serviceName')

          echo "Deployment of $UPDATE_ECS_SERVICE has been completed"