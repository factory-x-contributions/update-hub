include:
  - local: .helper/gitlab-ci/tofu/.common.yaml
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/base.yaml"
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/versioning.yaml"
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/helm-packaging.yaml"
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/dev-deployment.yaml"


stages:
  - check
  - test
  - version
  - sync
  - tofu
  - deploy
  - upload
  - dev-deployment
  
variables:
  http_proxy: $CODE_PROXY
  https_proxy: $CODE_PROXY
  no_proxy: "$CODE_NO_PROXY,captain.rtf.siemens.net,falcon.rtf-alm.siemens.cloud,xorcery.dema-platform.siemens.cloud"
  HTTP_PROXY: $http_proxy
  HTTPS_PROXY: $http_proxy
  NO_PROXY: "$no_proxy"

  AWS_ACCOUNT_ID: $DEV_AWS_ACCOUNT_ID
  TF_VAR_JWT_ROLE_NAME: $DEV_TF_VAR_JWT_ROLE_NAME
  PROD_AWS_ACCOUNT_ID: $PROD_AWS_ACCOUNT_ID
  TF_VAR_repository: $CI_PROJECT_PATH
  TF_VAR_config_file_path: $config
  IMAGE_LOCATION: ghcr.io/industrial-asset-hub/irs
  
  COMPONENT_NAME: updatehub

###########################################################################################################################################
### Stage: sync
###########################################################################################################################################

sync-image:
  stage: sync
  image:
    # pin the version to an actual release instead of latest to ensure stability
    name: quay.io/skopeo/stable:latest
    entrypoint: [""]
  variables:
    # We do not need to checkout the repository for copying the images
    GIT_STRATEGY: none
  script:
    # Login to cr.siemens.com
    - skopeo login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - skopeo login -u $TF_VAR_github_pat_username -p $TF_VAR_github_pat_token $IMAGE_LOCATION
    # If the other registry requires authentication, you MUST login there as well!
    # Set SOURCE_IMAGE to the image you want to copy, e.g., docker://cr.siemens.com/your-group/your-project:latest
    # Set TARGET_IMAGE to the image you want to copy to, e.g., docker://your-ecr-id.dkr.ecr.your-region.amazonaws.com/your-project:latest
    - SOURCE_IMAGE=docker://$IMAGE_LOCATION:latest
    - TARGET_IMAGE=docker://$CI_REGISTRY_IMAGE/build/$COMPONENT_NAME:$IMAGE_TAG
    - skopeo copy --all $SOURCE_IMAGE $TARGET_IMAGE


###########################################################################################################################################
### Tofu (Terraform)
### Stage: tofu & tofu-destroy
###########################################################################################################################################

# UpdateHub

dev:update-hub:plan:
  extends: .common-tofu
  script:
    - tofu plan -var-file="tfvars/${TF_VARFILE}" -out=${TF_PLANFILE} -lock="${LOCK_FLAG}"
  artifacts:
    paths:
      - ${TF_FOLDER}/${TF_PLANFILE}
  rules:
    - changes:
      - tofu/**/* # all files under folder
      when: on_success

dev:update-hub:apply:
  needs:
    - dev:update-hub:plan
  extends: .common-tofu
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
  script:
    - tofu apply -input=false -lock="${LOCK_FLAG}" ${TF_PLANFILE}
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: never
    - changes:
      - tofu/**/* # all files under folder
      when: manual

dev:update-hub:destroy:
  extends: .common-tofu
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
    action: stop
  script:
    - tofu plan -destroy -var-file="tfvars/${TF_VARFILE}" -var-file="tfvars/ci.tfvars" -out=${TF_PLANFILE} -lock="${LOCK_FLAG}"
    - tofu apply -input=false -lock="${LOCK_FLAG}" ${TF_PLANFILE}
  rules:
    # Only main and tags
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: never
    # Only if explicitly triggered and variable is set
    - if: $CI_PIPELINE_SOURCE == "web" && $DESTROY_RESOURCE == "true"
      when: manual


###########################################################################################################################################
### Stage: deploy
###########################################################################################################################################

deploy:
  stage: deploy
  extends: .common-tofu
  variables:
    FILE: "${CI_PROJECT_DIR}/tofu/templates/irs-task-definition.json"
    PORT: 8080
    NAME: "$COMPONENT_NAME"
    ECS_TASK_FAMILY: "irs-service-task"
  before_script: 
    - !reference [.common-tofu, before_script]
    - |
      ecs_task_execution_role_arn=$(tofu output -raw -var-file="tfvars/${TF_VARFILE}" ecs_task_execution_role_arn)
      github_pat_secret_arn=$(tofu output -raw -var-file="tfvars/${TF_VARFILE}" github_pat_secret_arn)
      irs_log_group_name=$(tofu output -raw -var-file="tfvars/${TF_VARFILE}" irs_log_group_name)
      aws_ecs_cluster_name=$(tofu output -raw -var-file="tfvars/${TF_VARFILE}" aws_ecs_cluster_name)
      aws_ecs_service_name=$(tofu output -raw -var-file="tfvars/${TF_VARFILE}" aws_ecs_service_name)

      IMAGE="ghcr.io/industrial-asset-hub/irs:latest"
      if [ $DIGIST ]; then
        IMAGE="ghcr.io/industrial-asset-hub/irs@sha256:${DIGIST}"
      fi
  script: |
    cat <<< $(jq --arg ecs_task_execution_role_arn "$ecs_task_execution_role_arn" '.executionRoleArn=$ecs_task_execution_role_arn' $FILE ) > $FILE
    cat <<< $(jq --arg NAME "$NAME" '.containerDefinitions[0].name=$NAME' $FILE ) > $FILE
    cat <<< $(jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image=$IMAGE' $FILE ) > $FILE
    cat <<< $(jq --arg github_pat_secret_arn "$github_pat_secret_arn" '.containerDefinitions[0].repositoryCredentials.credentialsParameter=$github_pat_secret_arn' $FILE ) > $FILE
    cat <<< $(jq --arg irs_log_group_name "$irs_log_group_name" '.containerDefinitions[0].logConfiguration.options."awslogs-group"=$irs_log_group_name' $FILE ) > $FILE
    cat <<< $(jq --arg AWS_REGION "$AWS_REGION" '.containerDefinitions[0].logConfiguration.options."awslogs-region"=$AWS_REGION' $FILE ) > $FILE
    cat <<< $(jq --argjson PORT "$PORT" '.containerDefinitions[0].portMappings[0].containerPort=$PORT' $FILE ) > $FILE
    cat <<< $(jq --arg PORT "curl -f http://localhost:${PORT}/swagger/index.html || exit 1" '.containerDefinitions[0].healthCheck.command[1]=$PORT' $FILE ) > $FILE

    export TASK_REVISION=$(aws ecs register-task-definition \
      --family "$ECS_TASK_FAMILY" \
      --cli-input-json file://$FILE \
      --region $AWS_REGION | jq --raw-output '.taskDefinition.revision')

    echo "Registered ECS Task Definition = "$TASK_REVISION
    echo "Updated Task Definition = $ECS_TASK_FAMILY:"$TASK_REVISION

    UPDATE_ECS_SERVICE=$(aws ecs update-service \
      --cluster $aws_ecs_cluster_name \
      --service $aws_ecs_service_name \
      --task-definition $ECS_TASK_FAMILY:$TASK_REVISION \
      --desired-count 1 \
      --region $AWS_REGION \
      --force-new-deployment | jq --raw-output '.service.serviceName')

    echo "Deployment of $UPDATE_ECS_SERVICE has been completed"

###########################################################################################################################################
### Stage: upload
###########################################################################################################################################

createHelmPackage:
  extends: .package_push_helmchart
  needs: ["version"]

###########################################################################################################################################
### Stage: dev-deployment
###########################################################################################################################################

commitToUmbrella:
  needs: ["version", "createHelmPackage"]
  variables:
    BRANCH_TARGET_BRANCH: "fx/update-hub"
    MAIN_TARGET_BRANCH: "fx/update-hub"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG
      exists:
        - "**/Chart.yaml"
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      exists:
        - "**/Chart.yaml"
      when: on_success
      allow_failure: true

