include:
  - local: .helper/gitlab-ci/tofu/.common.yaml
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/base.yaml"
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/versioning.yaml"
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/helm-packaging.yaml"
  - project: "common-device-management/utils/templates/gitlab-ci"
    ref: main
    file: "shared/dev-deployment.yaml"
  - project: awesome-ci/templates
    file:
      - general/use-proxy.gitlab-ci.yml
      - dotnet/run-dotnet-tests.gitlab-ci.yml
      - docker/build-docker-image.gitlab-ci.yml

stages:
  - check
  - test
  - version
  - build
  - tofu
  - upload
  - dev-deployment

variables:
  http_proxy: $CODE_PROXY
  https_proxy: $CODE_PROXY
  no_proxy: "$CODE_NO_PROXY,captain.rtf.siemens.net,falcon.rtf-alm.siemens.cloud,xorcery.dema-platform.siemens.cloud"
  HTTP_PROXY: $http_proxy
  HTTPS_PROXY: $http_proxy
  NO_PROXY: "$no_proxy"

  AWS_ACCOUNT_ID: $DEV_AWS_ACCOUNT_ID
  TF_VAR_JWT_ROLE_NAME: $DEV_TF_VAR_JWT_ROLE_NAME
  PROD_AWS_ACCOUNT_ID: $PROD_AWS_ACCOUNT_ID
  TF_VAR_repository: $CI_PROJECT_PATH
  TF_VAR_config_file_path: $config

  COMPONENT_NAME: updatehub
  CONTAINER_NAME: $CI_REGISTRY_IMAGE/build/$COMPONENT_NAME
  DOTNET_VERSION: "9.0"

test:
  extends:
    - .awesome-ci/use-proxy
    - .awesome-ci/run-dotnet-tests
  stage: test
  variables:
    DOTNET_VERSION: "9.0" # Howto override the global variable
    TEST_DIRECTORY: "."

build:
  extends:
    - .awesome-ci/use-proxy
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  script:
    - dotnet restore
    - dotnet build

.container: &container
  extends:
    - .awesome-ci/use-proxy
    - .awesome-ci/build-docker-image
  stage: build
  variables:
    IMAGE_NAME: $CONTAINER_NAME
    BUILD_CONTEXT: $CI_PROJECT_DIR/
    EXTRA_ARGUMENTS: "--build-arg GIT_HASH=$CI_COMMIT_SHORT_SHA"
    BUILD_ENV: ""
  # version job, inects IMAGE_TAG and overrides that vor all specific jobs.
  # This is a workaround for the missing support of variables in extends
  before_script:
    - IMAGE_TAG=$IMAGE_TAG-$ARCH
    - env | sort

container:amd64:
  extends:
    - .container
  variables:
    ARCH: amd64
    IMAGE_TAG: $CONTAINER_TAG-amd64

container:arm64:
  extends:
    - .container
  variables:
    ARCH: arm64
    IMAGE_TAG: $CONTAINER_TAG-arm64
  tags:
    - DOCKER-AARCH64

container:multiarch:
  stage: build
  image:
    name: mplatform/manifest-tool:alpine-v2.1.5
    entrypoint: [""]
  variables:
    IMAGE_NAME: $CONTAINER_NAME
    MULTI_ARCH_IMAGE_TAG: $IMAGE_TAG
    REGISTRY_USER: "$CI_REGISTRY_USER"
    REGISTRY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TEMPLATE: $CONTAINER_NAME:$IMAGE_TAG-ARCH
  script:
    - manifest-tool --username $REGISTRY_USER --password $REGISTRY_PASSWORD push from-args
      --platforms=linux/amd64,linux/arm64
      --template $TEMPLATE
      --target $IMAGE_NAME:$MULTI_ARCH_IMAGE_TAG
    - manifest-tool --username $REGISTRY_USER --password $REGISTRY_PASSWORD inspect
      $IMAGE_NAME:$MULTI_ARCH_IMAGE_TAG
    - echo "IMAGE=${IMAGE_NAME}:${MULTI_ARCH_IMAGE_TAG}" >> outputs.env
    - echo "IMAGE_NAME=$IMAGE_NAME" >> outputs.env
    - echo "IMAGE_TAG=$MULTI_ARCH_IMAGE_TAG" >> outputs.env
    - cat outputs.env
  needs:
    - job: version
      artifacts: true
    - job: container:amd64
      artifacts: false
    - job: container:arm64
      artifacts: false

###########################################################################################################################################
### Tofu (Terraform)
### Stage: tofu & tofu-destroy
###########################################################################################################################################

# UpdateHub

dev:update-hub:plan:
  extends: .common-tofu
  script:
    - tofu plan -var-file="tfvars/${TF_VARFILE}" -out=${TF_PLANFILE} -lock="${LOCK_FLAG}"
  artifacts:
    paths:
      - ${TF_FOLDER}/${TF_PLANFILE}
  rules:
    - changes:
        - tofu/**/* # all files under folder
      when: on_success

dev:update-hub:apply:
  needs:
    - dev:update-hub:plan
  extends: .common-tofu
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
  script:
    - tofu apply -input=false -lock="${LOCK_FLAG}" ${TF_PLANFILE}
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: never
    - changes:
        - tofu/**/* # all files under folder
      when: manual

dev:update-hub:destroy:
  extends: .common-tofu
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
    action: stop
  script:
    - tofu plan -destroy -var-file="tfvars/${TF_VARFILE}" -var-file="tfvars/ci.tfvars" -out=${TF_PLANFILE} -lock="${LOCK_FLAG}"
    - tofu apply -input=false -lock="${LOCK_FLAG}" ${TF_PLANFILE}
  rules:
    # Only main and tags
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: never
    # Only if explicitly triggered and variable is set
    - if: $CI_PIPELINE_SOURCE == "web" && $DESTROY_RESOURCE == "true"
      when: manual

###########################################################################################################################################
### Stage: upload
###########################################################################################################################################

createHelmPackage:
  extends: .package_push_helmchart
  needs: ["version", "container:multiarch"]

###########################################################################################################################################
### Stage: dev-deployment
###########################################################################################################################################

commitToUmbrella:
  needs: ["version", "createHelmPackage"]
  variables:
    BRANCH_TARGET_BRANCH: "fx/update-hub"
    MAIN_TARGET_BRANCH: "fx/update-hub"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG
      exists:
        - "**/Chart.yaml"
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      exists:
        - "**/Chart.yaml"
      when: on_success
      allow_failure: true
