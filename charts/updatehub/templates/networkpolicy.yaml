apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "updatehub.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "updatehub.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      name: {{ include "updatehub.name" . }}
  ingress:
    {{- range .Values.ingressServices }}
    - from:
        - podSelector:
            matchLabels:
              name: {{ .name }}
      ports:
        - protocol: {{ .protocol }}
          port: {{ .port }}
    {{- end }}