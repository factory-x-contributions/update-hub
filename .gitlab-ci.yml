include:
  - local: .helper/gitlab-ci/tofu/.common.yaml

stages:
  - tofu
  - deploy
  
variables:
  http_proxy: $CODE_PROXY
  https_proxy: $CODE_PROXY
  no_proxy: "$CODE_NO_PROXY,captain.rtf.siemens.net,falcon.rtf-alm.siemens.cloud,xorcery.dema-platform.siemens.cloud"
  HTTP_PROXY: $http_proxy
  HTTPS_PROXY: $http_proxy
  NO_PROXY: "$no_proxy"

  AWS_ACCOUNT_ID: $DEV_AWS_ACCOUNT_ID
  PROD_AWS_ACCOUNT_ID: $PROD_AWS_ACCOUNT_ID
  
  COMPONENT_NAME: updateHub


###########################################################################################################################################
### Tofu (Terraform)
### Stage: tofu & tofu-destroy
###########################################################################################################################################

# UpdateHub

dev:update-hub:plan:
  extends: .common-tofu
  script:
    - tofu plan -var-file="tfvars/${TF_VARFILE}" -var-file="tfvars/ci.tfvars" -out=${TF_PLANFILE} -lock="${LOCK_FLAG}"
  artifacts:
    paths:
      - ${TF_FOLDER}/${TF_PLANFILE}
  rules:
    - changes:
      - tofu/**/* # all files under folder
      when: on_success

dev:update-hub:apply:
  needs:
    - dev:update-hub:plan
  extends: .common-tofu
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
  script:
    - tofu apply -input=false -lock="${LOCK_FLAG}" ${TF_PLANFILE}
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: never
    - changes:
      - tofu/**/* # all files under folder
      when: manual

dev:update-hub:destroy:
  extends: .common-tofu
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
    action: stop
  script:
    - tofu plan -destroy -var-file="tfvars/${TF_VARFILE}" -var-file="tfvars/ci.tfvars" -out=${TF_PLANFILE} -lock="${LOCK_FLAG}"
    - tofu apply -input=false -lock="${LOCK_FLAG}" ${TF_PLANFILE}
  rules:
    # Only main and tags
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null
      when: never
    # Only if explicitly triggered and variable is set
    - if: $CI_PIPELINE_SOURCE == "web" && $DESTROY_RESOURCE == "true"
      when: manual


###########################################################################################################################################
### Stage: deploy
###########################################################################################################################################

deploy:
  stage: deploy
  image: cr.siemens.com/common-device-management/utils/templates/cicd-images/opentofu@sha256:03fd8e2f1b5564f6652c5809fe2948343882a4d638c33cd730d36d82733467b7
  variables:
    TF_HTTP_USERNAME: "gitlab-ci-token"
    TF_HTTP_PASSWORD: ${CI_JOB_TOKEN}
    TF_OUTPUT_JSON: "tofu-output.json"
    TF_FOLDER: tofu
    AWS_REGION: eu-central-1
    TF_VARFILE: "dev.tfvars"

    FILE: "./tofu/templates/irs-task-definition.json"
    PORT: 8080
    NAME: "$COMPONENT_NAME"
    ECS_TASK_FAMILY: "irs-service-task"

    IMAGE_LOCATION: ghcr.io/industrial-asset-hub/irs
  before_script: |
    ecs_task_execution_role_arn=$(terraform output -var-file="tfvars/${TF_VARFILE}" ecs_task_execution_role_arn)
    github_pat_secret_arn=$(terraform output -var-file="tfvars/${TF_VARFILE}" github_pat_secret_arn)
    irs_log_group_name=$(terraform output -var-file="tfvars/${TF_VARFILE}" irs_log_group_name)
    aws_ecs_cluster_name=$(terraform output -var-file="tfvars/${TF_VARFILE}" aws_ecs_cluster_name)
    aws_ecs_service_name=$(terraform output -var-file="tfvars/${TF_VARFILE}" aws_ecs_service_name)

    IMAGE="ghcr.io/industrial-asset-hub/irs:latest"
    if [ $DIGIST ]; then
      IMAGE="ghcr.io/industrial-asset-hub/irs@sha256:${DIGIST}"
    fi
  script: |
    cat <<< $(jq '.executionRoleArn = "$ecs_task_execution_role_arn"' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].name = "$NAME"' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].image = "$IMAGE"' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].repositoryCredentials.credentialsParameter = "$github_pat_secret_arn"' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].logConfiguration.options."awslogs-group" = "$irs_log_group_name"' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].logConfiguration.options."awslogs-region" = "$AWS_REGION"' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].portMappings[0].containerPort = $PORT' $FILE ) > $FILE
    cat <<< $(jq '.containerDefinitions[0].healthCheck.command[1] = "curl -f http://localhost:${PORT}/swagger/index.html || exit 1"' $FILE ) > $FILE

    export TASK_REVISION=$(aws ecs register-task-definition \
      --family "$ECS_TASK_FAMILY" \
      --cli-input-json file://$FILE \
      --region $AWS_REGION | jq --raw-output '.taskDefinition.revision')

    echo "Registered ECS Task Definition = "$TASK_REVISION
    echo "Updated Task Definition = $ECS_TASK_FAMILY:"$TASK_REVISION

    UPDATE_ECS_SERVICE=$(aws ecs update-service \
      --cluster $aws_ecs_cluster_name \
      --service $aws_ecs_service_name \
      --task-definition $ECS_TASK_FAMILY:$TASK_REVISION \
      --desired-count 1 \
      --region $AWS_REGION \
      --force-new-deployment | jq --raw-output '.service.serviceName')

    echo "Deployment of $UPDATE_ECS_SERVICE has been completed"