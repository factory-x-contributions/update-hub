---
default_stages: [commit]
exclude: "^charts/|^tofu/|^.helper/"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-json
      - id: check-xml
      - id: check-yaml
        exclude: "(cookiecutter-project-template/{{ cookiecutter.al_id }}/.goreleaser.yaml)"
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: no-commit-to-branch # No (direct) commits to master
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/detailyang/pre-commit-shell.git
    rev: 1.0.5
    hooks:
      - id: shell-lint
        files: \.(sh|bash)$

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-crlf
        files: \.md$
      - id: remove-crlf
        files: \.md$
      - id: forbid-tabs
        exclude: "(.gitmodules|Makefile|makefile|.mk|go.mod)"
        exclude_types: [go]
      - id: remove-tabs
        exclude: "(.gitmodules|Makefile|makefile|.mk|go.mod)"
        exclude_types: [go]

  # Commitlint
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.30.0
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages: [push]

  - repo: local
    hooks:
      - id: dotnet-tool-restore
        name: Install .NET tools
        entry: dotnet tool restore
        language: system
        always_run: true
        pass_filenames: false
        stages:
          - commit
          - push
          - post-checkout
          - post-rewrite
        description: Install the .NET tools listed at .config/dotnet-tools.json.
      - id: csharpier
        name: Run CSharpier on C# files
        entry: dotnet tool run CSharpier format
        language: system
        types:
          - c#
        description: CSharpier is an opinionated C# formatter inspired by Prettier.

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint

  - repo: https://github.com/fsfe/reuse-tool
    rev: v4.0.3
    hooks:
      - id: reuse
